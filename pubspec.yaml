name: interceptify
description: A Flutter DevTools extension for real-time network inspection. Intercept, pause, modify, and replay requests from Dio and package:http directly inside your DevTools.
version: 0.0.1+4
homepage: https://github.com/yusriltakeuchi/interceptify
repository: https://github.com/yusriltakeuchi/interceptify
issue_tracker: https://github.com/yusriltakeuchi/interceptify/issues

topics:
  - networking
  - debugging
  - devtools
  - dio
  - http

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.9.2
  http: ^1.6.0
  uuid: ^4.5.3
  collection: ^1.19.1
  vm_service: ^15.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  # DevTools extension assets are bundled in extension/devtools/build/web/
  # and served via the devtools_extensions mechanism.
