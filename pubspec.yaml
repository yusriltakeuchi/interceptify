name: interceptify
description: >-
  A Flutter DevTools extension for real-time network inspection, filtering, and
  modification. Supports Dio and package:http. Intercept,
  pause, edit, and replay requests directly from your DevTools panel.
version: 0.0.1+2
homepage: https://github.com/yusriltakeuchi/interceptify
repository: https://github.com/yusriltakeuchi/interceptify
issue_tracker: https://github.com/yusriltakeuchi/interceptify/issues

topics:
  - networking
  - debugging
  - devtools
  - dio
  - http

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  http: ^1.2.0
  uuid: ^4.3.0
  collection: ^1.18.0
  vm_service: ^14.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  # DevTools extension assets are bundled in extension/devtools/build/web/
  # and served via the devtools_extensions mechanism.
